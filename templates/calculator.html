<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calculator Page</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<form id="calculator-form">
    <fieldset>
        <legend>TO</legend>

        <label>country_to
        <input type="text" name="country_to" required/>
        </label>

        <label>city_to
        <input type="text" name="city_to" required/>
        </label>

        <label>street_to
        <input type="text" name="street_to" required/>
        </label>

        <label>name_to
        <input type="text" name="name_to" required/>
        </label>

        <label>postal_code_to
        <input type="text" name="postal_code_to" required/>
        </label>
    </fieldset>

    <fieldset>
        <legend>PACKAGE (cm and grams)</legend>

        <label>weight
            <input type="number" name="weight" min="0.1">
        </label>

        <label>length
            <input type="number" name="length" min="0.1">
        </label>

        <label>width
            <input type="number" name="width" min="0.1">
        </label>

        <label>height
            <input type="number" name="height" min="0.1">
        </label>
    </fieldset>

    <fieldset>
        <legend>DHL TOGGLE OPTIONS</legend>

    <label class="toggle" for="dhl_customs_checkbox">
        <!-- whole toggle element -->
        <span class="toggle_label">Customs Declarable? <br> Set to "false" by default. </span>

        <!-- this input is where "false" and "true" get saved to-->
        <input type="hidden" name="dhl_is_customs_declarable" value="false">
        <input type="checkbox" class="toggle_input" id="dhl_customs_checkbox" onchange="this.previousElementSibling.value = this.checked ? 'true' : 'false'">
        <span class="toggle_slider"> </span>
        <!-- whole toggle element -->
    </label>

      <label class="toggle" for="dhl_next_day_checkbox">
          <!-- whole toggle element -->
            <span class="toggle_label">Next Business Day? <br> Set to "false" by default.</span>

           <!-- this input is where "false" and "true" get saved to-->
            <input type="hidden" name="dhl_is_next_business_day" id="dhl_is_next_business_day" value="false">
            <input type="checkbox" class="toggle_input" id="dhl_next_day_checkbox" onchange="this.previousElementSibling.value = this.checked ? 'true' : 'false'">
            <span class="toggle_slider"></span>
          <!-- whole toggle element -->
      </label>
    </fieldset>

    </label>

</form>
</body>
</html>

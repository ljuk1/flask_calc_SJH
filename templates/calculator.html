<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calculator Page</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<form id="calculator-form" method="POST">
    <fieldset>
        <legend>TO (DESTINATION)</legend>

        <label>country_to
        <input type="text" name="country_to" value="GB" required/>
        </label>

        <label>city_to
        <input type="text" name="city_to" value="London" required/>
        </label>

        <label>street_to
        <input type="text" name="street_to" value="80 Lytton Avenue" required/>
        </label>

        <label>name_to
        <input type="text" name="name_to" value="Alek" required/>
        </label>

        <label>postal_code_to
        <input type="text" name="postal_code_to" value="EN36EN" required/>
        </label>
    </fieldset>

    <fieldset>
        <legend>PACKAGE (cm and grams)</legend>

        <label>weight
            <input type="number" name="weight" required>
        </label>

        <label>length
            <input type="number" name="length" required>
        </label>

        <label>width
            <input type="number" name="width" required>
        </label>

        <label>height
            <input type="number" name="height" required>
        </label>
    </fieldset>

    <fieldset>
        <legend>DHL TOGGLE OPTIONS</legend>

    <label class="toggle" for="dhl_customs_checkbox">
        <!-- whole toggle element -->
        <span class="toggle_label">DHL EXPRESS: Customs Declarable? <br> Set to "false" by default. </span>

        <!-- this input is where "false" and "true" get saved to-->
        <input type="hidden" name="dhl_is_customs_declarable" value="false">
        <input type="checkbox" class="toggle_input" id="dhl_customs_checkbox" onchange="this.previousElementSibling.value = this.checked ? 'true' : 'false'">
        <span class="toggle_slider"> </span>
        <!-- whole toggle element -->
    </label>

      <label class="toggle" for="dhl_next_day_checkbox">
          <!-- whole toggle element -->
            <span class="toggle_label">DHL EXPRESS: Next Business Day? <br> Set to "false" by default.</span>

           <!-- this input is where "false" and "true" get saved to-->
            <input type="hidden" name="dhl_is_next_business_day" id="dhl_is_next_business_day" value="false">
            <input type="checkbox" class="toggle_input" id="dhl_next_day_checkbox" onchange="this.previousElementSibling.value = this.checked ? 'true' : 'false'">
            <span class="toggle_slider"></span>
          <!-- whole toggle element -->
      </label>
    </fieldset>

    <button
      type="submit"
      style="
        display: block;
        width: 100%;
        margin: 28px 0 0 0;
        padding: 16px;
        font-family: inherit;
        font-size: 16px;
        font-weight: 600;
        color: #111827;
        background: yellow;
        border: black;
        border-radius: 14px;
        cursor: pointer;
        letter-spacing: -0.01em;
        text-align: center;
        -webkit-tap-highlight-color: transparent;
        transition: transform 0.1s ease, box-shadow 0.2s ease;
      ">Calculate
    </button>
</form>
</body>
</html>
